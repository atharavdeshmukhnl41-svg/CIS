<!DOCTYPE html>
<html>
<head>
<title>Cloud Intelligence Dashboard</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
 
<h1>Cloud Intelligence Dashboard</h1>
 
<!-- VM RCA -->
<div class="card">
<h2>VM RCA</h2>
<input id="vmName" placeholder="VM Name">
<input id="vmPort" placeholder="Port"> <!-- ✅ FIXED -->
<button onclick="checkVM()">Check VM</button>
<pre id="vmResult"></pre>
</div>
 
<!-- Application RCA -->
<div class="card">
<h2>Application RCA</h2>
<input id="appName" placeholder="App Name">
<input id="appPort" placeholder="Port">
<button onclick="checkApp()">Check App</button> <!-- ✅ FIXED -->
<pre id="appResult"></pre>
</div>
 
<!-- Metrics -->
<div class="card">
<h2>Metrics</h2>
<input id="metricsVm" placeholder="VM Name"> <!-- ✅ FIXED -->
<button onclick="getMetrics()">Get Metrics</button>
<pre id="metricsResult"></pre> <!-- ✅ FIXED -->
</div>
 
<!-- Alerts -->
<div class="card">
<h2>Alerts</h2>
<input id="alertVM" placeholder="VM Name">
<button onclick="loadAlerts()">Load Alerts</button>
<pre id="alertResult"></pre>
</div>
 
<!-- Graph -->
<div class="card">
<h2>Topology Graph</h2>
<button onclick="loadGraph()">Load Graph</button>
<div id="graph" style="height:400px;"></div>
</div>
 
<script src="app.js"></script>
<script src="graph.js"></script>
 
</body>
</html>
